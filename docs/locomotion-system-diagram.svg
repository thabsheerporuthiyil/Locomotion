<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 14px Arial, sans-serif; fill: #111827; }
      .text  { font: 12px Arial, sans-serif; fill: #374151; }
      .box   { fill: #ffffff; stroke: #4f46e5; stroke-width: 2; rx: 10; }
      .box2  { fill: #f8fafc; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .box3  { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 10; }
      .box4  { fill: #f0f9ff; stroke: #0284c7; stroke-width: 2; rx: 10; }
      .line  { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash  { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="860" fill="#f9fafb" rx="16" />
  <text x="40" y="60" class="title">Locomotion System Design</text>

  <!-- Clients -->
  <rect x="60" y="110" width="260" height="90" class="box" />
  <text x="80" y="140" class="label">Clients</text>
  <text x="80" y="165" class="text">Rider Web</text>
  <text x="160" y="165" class="text">Driver Mobile (Expo)</text>
  <text x="80" y="185" class="text">Admin Web</text>

  <!-- CDN + Static -->
  <rect x="900" y="110" width="230" height="90" class="box4" />
  <text x="920" y="140" class="label">Static Content</text>
  <text x="920" y="165" class="text">CDN / Vercel</text>

  <!-- Load / API -->
  <rect x="420" y="110" width="300" height="90" class="box3" />
  <text x="440" y="140" class="label">API Entry</text>
  <text x="440" y="165" class="text">Traefik Ingress + Django API</text>

  <!-- Core Services -->
  <rect x="80" y="260" width="300" height="120" class="box2" />
  <text x="100" y="290" class="label">Backend (k3s on EC2)</text>
  <text x="100" y="315" class="text">Django + DRF + Channels</text>
  <text x="100" y="335" class="text">Celery + Celery Beat</text>

  <rect x="430" y="260" width="300" height="120" class="box2" />
  <text x="450" y="290" class="label">AI Service</text>
  <text x="450" y="315" class="text">FastAPI + Qdrant</text>
  <text x="450" y="335" class="text">Gemini / Groq</text>

  <!-- Data Stores -->
  <rect x="60" y="440" width="260" height="120" class="box" />
  <text x="80" y="470" class="label">PostgreSQL</text>
  <text x="80" y="495" class="text">Users, rides, payments</text>

  <rect x="360" y="440" width="220" height="120" class="box" />
  <text x="380" y="470" class="label">Redis</text>
  <text x="380" y="495" class="text">Cache + Channels + Broker</text>

  <rect x="620" y="440" width="240" height="120" class="box" />
  <text x="640" y="470" class="label">DynamoDB</text>
  <text x="640" y="495" class="text">Ride location history</text>

  <rect x="900" y="440" width="230" height="120" class="box" />
  <text x="920" y="470" class="label">S3</text>
  <text x="920" y="495" class="text">Media storage</text>

  <!-- Notifications -->
  <rect x="160" y="620" width="220" height="110" class="box4" />
  <text x="180" y="650" class="label">SQS</text>
  <text x="180" y="675" class="text">Notification Queue</text>

  <rect x="430" y="620" width="260" height="110" class="box4" />
  <text x="450" y="650" class="label">AWS Lambda</text>
  <text x="450" y="675" class="text">SQS Consumer</text>

  <rect x="760" y="620" width="300" height="110" class="box4" />
  <text x="780" y="650" class="label">Firebase Cloud Messaging</text>
  <text x="780" y="675" class="text">Push delivery to devices</text>

  <!-- CI/CD -->
  <rect x="780" y="260" width="350" height="120" class="box3" />
  <text x="800" y="290" class="label">CI/CD</text>
  <text x="800" y="315" class="text">GitHub Actions</text>
  <text x="800" y="335" class="text">Build -> ECR -> SSM -> Helm</text>

  <rect x="780" y="390" width="350" height="40" class="box3" />
  <text x="800" y="415" class="text">AWS ECR (backend images)</text>

  <!-- Lines -->
  <path d="M320 155 L420 155" class="line" />
  <path d="M720 155 L900 155" class="line" />
  <path d="M570 200 L230 260" class="dash" />
  <path d="M570 200 L580 260" class="dash" />
  <path d="M570 200 L930 260" class="dash" />

  <path d="M230 380 L190 440" class="line" />
  <path d="M230 380 L470 440" class="line" />
  <path d="M230 380 L740 440" class="line" />
  <path d="M230 380 L1015 440" class="line" />

  <path d="M230 380 L270 620" class="line" />
  <path d="M380 675 L430 675" class="line" />
  <path d="M690 675 L760 675" class="line" />

  <path d="M955 380 L955 390" class="line" />
</svg>
