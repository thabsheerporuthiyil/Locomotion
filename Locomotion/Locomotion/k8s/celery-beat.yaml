apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: default
spec:
  replicas: 1 # MUST always be 1 to prevent duplicate scheduled tasks
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
      - name: celery-beat
        image: locomotion-web:latest # Uses same image as web
        imagePullPolicy: IfNotPresent
        command: ["celery", "-A", "Locomotion", "beat", "-l", "info"]
        envFrom:
        - secretRef:
            name: locomotion-secrets
        - configMapRef:
            name: locomotion-config
        env:
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: locomotion-secrets
              key: CELERY_BROKER_URL
