apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: locomotion-web:latest  # Needs to be built locally
        imagePullPolicy: IfNotPresent
        command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "Locomotion.asgi:application"]
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: locomotion-secrets
        - configMapRef:
            name: locomotion-config
        env:
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: locomotion-secrets
              key: CELERY_BROKER_URL

---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: default
spec:
  selector:
    app: web
  ports:
  - port: 8000
    targetPort: 8000
