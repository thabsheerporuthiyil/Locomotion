apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      containers:
      - name: celery
        image: locomotion-web:latest # Uses the same image as web
        imagePullPolicy: IfNotPresent
        command: ["celery", "-A", "Locomotion", "worker", "--loglevel=info", "--pool=solo"]
        envFrom:
        - secretRef:
            name: locomotion-secrets
        - configMapRef:
            name: locomotion-config
        env:
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: locomotion-secrets
              key: CELERY_BROKER_URL
