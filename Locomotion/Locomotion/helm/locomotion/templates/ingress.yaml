{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "locomotion.fullname" . }}
  labels:
    {{- include "locomotion.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - {{- if .host }}
      host: {{ .host | quote }}
      {{- end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .service "fastapi-ai" }}{{ include "locomotion.fullname" $ }}-fastapi-ai{{ else }}{{ include "locomotion.fullname" $ }}-web{{ end }}
                port:
                  number: {{ if eq .service "fastapi-ai" }}{{ $.Values.fastapiAi.service.port }}{{ else }}{{ $.Values.web.service.port }}{{ end }}
          {{- end }}
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
