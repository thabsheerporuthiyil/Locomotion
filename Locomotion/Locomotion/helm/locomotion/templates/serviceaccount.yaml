{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "locomotion.serviceAccountName" . }}
  labels:
    {{- include "locomotion.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.fastapiAiServiceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "locomotion.fastapiAiServiceAccountName" . }}
  labels:
    {{- include "locomotion.labels" . | nindent 4 }}
  {{- with .Values.fastapiAiServiceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.notificationWorker.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "locomotion.notificationWorkerServiceAccountName" . }}
  labels:
    {{- include "locomotion.labels" . | nindent 4 }}
  {{- with .Values.notificationWorker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
