{{- if and .Values.fastapiAi.enabled .Values.fastapiAi.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "locomotion.fullname" . }}-fastapi-ai
  labels:
    {{- include "locomotion.labels" . | nindent 4 }}
    app.kubernetes.io/component: fastapi-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "locomotion.fullname" . }}-fastapi-ai
  minReplicas: {{ .Values.fastapiAi.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.fastapiAi.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.fastapiAi.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
