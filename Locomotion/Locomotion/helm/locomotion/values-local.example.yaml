images:
  backend:
    repository: locomotion-web
    tag: latest
  ai:
    repository: locomotion-fastapi-ai
    tag: latest

appConfig:
  debug: true
  allowedHosts:
    - "*"
  corsAllowedOrigins:
    - http://localhost:5173
  csrfTrustedOrigins:
    - http://localhost:5173
  googleClientId: your-google-web-client-id
  defaultFromEmail: noreply@locomotion.local
  useS3: false
  llmProvider: gemini
  sqsQueueUrl: https://sqs.eu-north-1.amazonaws.com/123456789012/locomotion-notifications
  aiAllowedOrigins:
    - http://localhost:5173

secrets:
  create: true
  djangoSecretKey: change-me
  postgresPassword: change-me
  emailHostUser: ""
  emailHostPassword: ""
  awsAccessKeyId: ""
  awsSecretAccessKey: ""
  geminiApiKey: ""
  groqApiKey: ""
  razorpayKeySecret: ""
  firebaseServiceAccountJson: |
    {
      "type": "service_account",
      "project_id": "replace-me"
    }

web:
  replicaCount: 1
  autoscaling:
    enabled: false

fastapiAi:
  replicaCount: 1
  autoscaling:
    enabled: false

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: localhost
      paths:
        - path: /api/ai
          pathType: Prefix
          service: fastapi-ai
        - path: /
          pathType: Prefix
          service: web

postgresql:
  enabled: true

redis:
  enabled: true

qdrant:
  enabled: true
