services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - app_network

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 Locomotion.asgi:application
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    expose:
      - "8000"
    depends_on:
      - redis
      - db
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - USE_S3=True
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
    networks:
      - app_network

  celery:
    build: .
    command: celery -A Locomotion worker --loglevel=info --pool=solo
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - USE_S3=True
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
    networks:
      - app_network

  celery-beat:
    build: .
    command: celery -A Locomotion beat -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
    networks:
      - app_network

  notification-worker:
    build: .
    command: python notification_worker.py
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SQS_QUEUE_URL=${AWS_SQS_QUEUE_URL}
      - FIREBASE_SERVICE_ACCOUNT_PATH=firebase-service-account.json
    restart: unless-stopped
    networks:
      - app_network

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app_network
      
  fastapi-ai:
    build: 
      context: ../ai_service 
    env_file:
      - .env
    ports:
      - "8001:8000"
    expose:
      - "8000"
    depends_on:
      - qdrant
    environment:
      - QDRANT_HOST=${QDRANT_HOST}
      - QDRANT_PORT=${QDRANT_PORT}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - PYTHONUNBUFFERED=1
    volumes:
      - ../ai_service:/app
    restart: unless-stopped
    networks:
      - app_network
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - web
      - fastapi-ai
    networks:
      - app_network

volumes:
  postgres_data:
  qdrant_data:

networks:
  app_network:
    driver: bridge
