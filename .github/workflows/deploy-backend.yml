name: Deploy Backend

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy. Defaults to the current commit SHA.
        required: false
        type: string

concurrency:
  group: deploy-backend-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2 / k3s
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy backend via SSM
        shell: bash
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_BACKEND_REPOSITORY: ${{ secrets.ECR_BACKEND_REPOSITORY }}
          MANUAL_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          SSM_POLL_SECONDS=10
          SSM_MAX_ATTEMPTS=180
          SSM_TIMEOUT_SECONDS=2400
          SSM_READY_MAX_ATTEMPTS=12

          if [ -z "${ECR_BACKEND_REPOSITORY:-}" ]; then
            echo "GitHub secret ECR_BACKEND_REPOSITORY is missing."
            echo "Expected format: 471914528467.dkr.ecr.ap-south-1.amazonaws.com/locomotion-web"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_IMAGE_TAG="${MANUAL_IMAGE_TAG:-}"
            if [ -z "$RAW_IMAGE_TAG" ]; then
              RAW_IMAGE_TAG="${GITHUB_SHA}"
            fi
          else
            RAW_IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          fi

          IMAGE_TAG="$(printf "%s" "$RAW_IMAGE_TAG" | cut -c1-12)"
          print_ssm_output() {
            echo "SSM invocation details:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --output json || true
            echo "SSM stdout:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "StandardOutputContent" \
              --output text || true
            echo "SSM stderr:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text || true
          }

          echo "Checking SSM managed instance status..."
          SSM_PING_STATUS=""
          for attempt in $(seq 1 "$SSM_READY_MAX_ATTEMPTS"); do
            SSM_PING_STATUS="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo None)"

            echo "SSM ping status [$attempt/$SSM_READY_MAX_ATTEMPTS]: $SSM_PING_STATUS"

            if [ "$SSM_PING_STATUS" = "Online" ]; then
              break
            fi

            sleep 10
          done

          if [ "$SSM_PING_STATUS" != "Online" ]; then
            echo "EC2 instance is not Online in Systems Manager. Instance details:"
            aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" \
              --output json || true
            exit 1
          fi

          cat > commands.json <<EOF
          {
            "commands": [
              "bash -lc 'set -euxo pipefail; git -c safe.directory=/opt/locomotion -C /opt/locomotion checkout main; git -c safe.directory=/opt/locomotion -C /opt/locomotion pull --ff-only origin main; export KUBECONFIG=/etc/rancher/k3s/k3s.yaml; ECR_PASSWORD=\$(aws ecr get-login-password --region ${AWS_REGION}); sudo k3s ctr images pull --user AWS:\${ECR_PASSWORD} ${ECR_BACKEND_REPOSITORY}:${IMAGE_TAG}; for attempt in 1 2 3 4 5; do if helm upgrade --install locomotion /opt/locomotion/Locomotion/Locomotion/helm/locomotion -n locomotion -f /opt/locomotion/Locomotion/Locomotion/helm/locomotion/values-k3s-backend.yaml --set images.backend.repository=${ECR_BACKEND_REPOSITORY} --set images.backend.tag=${IMAGE_TAG} --set images.backend.pullPolicy=IfNotPresent --timeout 10m --atomic; then break; fi; if [ \"$attempt\" = \"5\" ]; then helm status locomotion -n locomotion || true; helm history locomotion -n locomotion || true; exit 1; fi; sleep 30; done; kubectl rollout status deployment/locomotion-locomotion-web -n locomotion --timeout=300s; kubectl rollout status deployment/locomotion-locomotion-celery -n locomotion --timeout=300s; kubectl rollout status deployment/locomotion-locomotion-celery-beat -n locomotion --timeout=300s; kubectl rollout status deployment/locomotion-locomotion-notification-worker -n locomotion --timeout=300s'"
            ]
          }
          EOF

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Locomotion backend from GitHub Actions" \
            --timeout-seconds "$SSM_TIMEOUT_SECONDS" \
            --parameters file://commands.json \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM command id: $COMMAND_ID"
          echo "Deploying backend image: ${ECR_BACKEND_REPOSITORY}:${IMAGE_TAG}"

          STATUS="Pending"
          for attempt in $(seq 1 "$SSM_MAX_ATTEMPTS"); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo Pending)"

            echo "SSM status [$attempt/$SSM_MAX_ATTEMPTS]: $STATUS"

            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "SSM command failed. Fetching output..."
                sleep 3
                print_ssm_output
                exit 1
                ;;
            esac

            sleep "$SSM_POLL_SECONDS"
          done

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command did not finish successfully within the timeout window."
            print_ssm_output
            exit 1
          fi

          echo "SSM command completed. Output:"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text
