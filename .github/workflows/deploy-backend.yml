name: Deploy Backend

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2 / k3s
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy backend via SSM
        shell: bash
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          SHORT_TAG="$(printf "%s" "$IMAGE_TAG" | cut -c1-12)"

          cat > commands.json <<EOF
          {
            "commands": [
              "bash -lc 'set -euo pipefail; cd /opt/locomotion; git checkout main; git pull --ff-only origin main; docker build -t locomotion-web:${SHORT_TAG} ./Locomotion/Locomotion; docker save locomotion-web:${SHORT_TAG} | sudo k3s ctr images import -; export KUBECONFIG=/etc/rancher/k3s/k3s.yaml; helm upgrade --install locomotion ./Locomotion/Locomotion/helm/locomotion -n locomotion -f ./Locomotion/Locomotion/helm/locomotion/values-k3s-backend.yaml --set images.backend.tag=${SHORT_TAG} --timeout 10m; kubectl rollout status deployment/locomotion-locomotion-web -n locomotion --timeout=300s'"
            ]
          }
          EOF

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Locomotion backend from GitHub Actions" \
            --parameters file://commands.json \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM command id: $COMMAND_ID"

          if ! aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID"; then
            echo "SSM command failed. Fetching output..."
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "StandardOutputContent" \
              --output text || true
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text || true
            exit 1
          fi

          echo "SSM command completed. Output:"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text
