name: Deploy Backend

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2 / k3s
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy backend via SSM
        shell: bash
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          SHORT_TAG="$(printf "%s" "$IMAGE_TAG" | cut -c1-12)"
          SSM_POLL_SECONDS=10
          SSM_MAX_ATTEMPTS=180
          SSM_TIMEOUT_SECONDS=2400
          SSM_READY_MAX_ATTEMPTS=12

          print_ssm_output() {
            echo "SSM invocation details:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --output json || true
            echo "SSM stdout:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "StandardOutputContent" \
              --output text || true
            echo "SSM stderr:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text || true
          }

          echo "Checking SSM managed instance status..."
          SSM_PING_STATUS=""
          for attempt in $(seq 1 "$SSM_READY_MAX_ATTEMPTS"); do
            SSM_PING_STATUS="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo None)"

            echo "SSM ping status [$attempt/$SSM_READY_MAX_ATTEMPTS]: $SSM_PING_STATUS"

            if [ "$SSM_PING_STATUS" = "Online" ]; then
              break
            fi

            sleep 10
          done

          if [ "$SSM_PING_STATUS" != "Online" ]; then
            echo "EC2 instance is not Online in Systems Manager. Instance details:"
            aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" \
              --output json || true
            exit 1
          fi

          cat > commands.json <<EOF
          {
            "commands": [
              "bash -lc 'set -euxo pipefail; git -c safe.directory=/opt/locomotion -C /opt/locomotion checkout main; git -c safe.directory=/opt/locomotion -C /opt/locomotion pull --ff-only origin main; cd /opt/locomotion; docker build -t locomotion-web:${SHORT_TAG} ./Locomotion/Locomotion; docker save locomotion-web:${SHORT_TAG} | sudo k3s ctr images import -; export KUBECONFIG=/etc/rancher/k3s/k3s.yaml; helm upgrade --install locomotion ./Locomotion/Locomotion/helm/locomotion -n locomotion -f ./Locomotion/Locomotion/helm/locomotion/values-k3s-backend.yaml --set images.backend.tag=${SHORT_TAG} --timeout 10m; kubectl rollout status deployment/locomotion-locomotion-web -n locomotion --timeout=300s'"
            ]
          }
          EOF

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Locomotion backend from GitHub Actions" \
            --timeout-seconds "$SSM_TIMEOUT_SECONDS" \
            --parameters file://commands.json \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM command id: $COMMAND_ID"

          STATUS="Pending"
          for attempt in $(seq 1 "$SSM_MAX_ATTEMPTS"); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo Pending)"

            echo "SSM status [$attempt/$SSM_MAX_ATTEMPTS]: $STATUS"

            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "SSM command failed. Fetching output..."
                sleep 3
                print_ssm_output
                exit 1
                ;;
            esac

            sleep "$SSM_POLL_SECONDS"
          done

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command did not finish successfully within the timeout window."
            print_ssm_output
            exit 1
          fi

          echo "SSM command completed. Output:"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text
