name: CI

on:
  push:
    branches:
      - main
      - develop
      - dev
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: locomotion
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d locomotion"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: Locomotion/Locomotion

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_ENV: development
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      POSTGRES_DB: locomotion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      REDIS_CACHE_URL: redis://127.0.0.1:6379/1
      CHANNEL_REDIS_URL: redis://127.0.0.1:6379/1
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      AI_SERVICE_URL: http://127.0.0.1:8001
      DEFAULT_FROM_EMAIL: ci@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Locomotion/Locomotion/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run Django tests
        run: python manage.py test accounts.tests bookings.tests drivers.tests location.tests

  backend_image:
    name: Backend Docker Build and Push
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - mobile
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute backend image tag
        id: backend_image_tag
        shell: bash
        run: echo "tag=$(printf "%s" "$GITHUB_SHA" | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Locomotion/Locomotion
          file: ./Locomotion/Locomotion/Dockerfile
          push: true
          tags: ${{ secrets.ECR_BACKEND_REPOSITORY }}:${{ steps.backend_image_tag.outputs.tag }}
          provenance: false

  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Locomotion React/Locomotion React

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Locomotion React/Locomotion React/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  mobile:
    name: Mobile Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: LocomotionMobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: LocomotionMobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
